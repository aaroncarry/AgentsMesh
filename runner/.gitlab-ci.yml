# GitLab CI/CD configuration for AgentsMesh Runner
#
# This pipeline builds CLI and Desktop versions, then releases to GitHub.
#
# Required CI/CD Variables:
#   - GITHUB_RELEASE_TOKEN: GitHub PAT with repo access to AgentsMesh/AgentsMeshRunner
#
# Required Runners:
#   - Docker runner with tags: [x86, docker] (for CLI builds and Linux desktop)
#   - macOS runner with tags: [macos, xcode]
#   - Windows runner with tag: [windows]

stages:
  - build
  - package
  - release

variables:
  VERSION: ${CI_COMMIT_TAG:-dev}
  GO_VERSION: "1.24"

# =============================================================================
# CLI Build (GoReleaser - cross-compile all platforms)
# =============================================================================

build:cli:
  stage: build
  tags: [x86, docker]
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  variables:
    # GoReleaser requires GITHUB_TOKEN for Homebrew formula update
    GITHUB_TOKEN: ${GITHUB_RELEASE_TOKEN}
  script:
    - cd runner
    # GoReleaser builds CLI artifacts and updates Homebrew formula
    # GitHub release upload is skipped (skip_upload: true in .goreleaser.yml)
    # Actual GitHub release is handled by release:github job
    - goreleaser release --clean
  artifacts:
    paths:
      - runner/dist/*.tar.gz
      - runner/dist/*.zip
      - runner/dist/*.deb
      - runner/dist/*.rpm
      - runner/dist/*.apk
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Desktop Builds (require native runners with CGO)
# =============================================================================

# macOS Desktop build (builds both amd64 and arm64 on arm64 runner)
build:desktop:macos:
  stage: build
  tags: [macos, xcode]
  before_script:
    # Ensure Go and brew are in PATH for shell executor
    - export PATH="/opt/homebrew/opt/go@1.24/bin:/opt/homebrew/bin:$PATH"
    # Explicitly set VERSION for shell executor (CI variables may not auto-expand)
    - export VERSION="${CI_COMMIT_TAG:-dev}"
    - echo "VERSION=$VERSION"
    - go version
  script:
    - cd runner
    - export VERSION="${CI_COMMIT_TAG:-dev}"
    # Build arm64 (native)
    - |
      echo "Building arm64 (VERSION=$VERSION)..."
      CGO_ENABLED=1 GOARCH=arm64 go build -tags desktop \
        -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -o runner-desktop-darwin-arm64 ./cmd/runner
    # Build amd64 (cross-compile)
    - |
      echo "Building amd64 (VERSION=$VERSION)..."
      CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -tags desktop \
        -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -o runner-desktop-darwin-amd64 ./cmd/runner
    # Create universal binary
    - |
      echo "Creating universal binary..."
      lipo -create -output runner-desktop-darwin-universal \
        runner-desktop-darwin-amd64 \
        runner-desktop-darwin-arm64
      file runner-desktop-darwin-*
  artifacts:
    paths:
      - runner/runner-desktop-darwin-arm64
      - runner/runner-desktop-darwin-amd64
      - runner/runner-desktop-darwin-universal
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

build:desktop:linux:
  stage: build
  tags: [x86, docker]
  # Use Docker executor with GTK dependencies pre-installed
  # If using shell executor, ensure libgtk-3-dev and libappindicator3-dev are installed
  image: golang:${GO_VERSION}
  before_script:
    - apt-get update && apt-get install -y libgtk-3-dev libappindicator3-dev
  script:
    - cd runner
    - |
      CGO_ENABLED=1 go build -tags desktop \
        -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -o runner-desktop-linux-amd64 ./cmd/runner
  artifacts:
    paths:
      - runner/runner-desktop-linux-amd64
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

build:desktop:windows:
  stage: build
  tags: [windows]
  script:
    - cd runner
    - |
      $env:CGO_ENABLED=1
      go build -tags desktop `
        -ldflags "-s -w -X main.version=$env:VERSION -X main.buildTime=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')" `
        -o runner-desktop-windows-amd64.exe ./cmd/runner
  artifacts:
    paths:
      - runner/runner-desktop-windows-amd64.exe
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Package Desktop Applications
# =============================================================================

package:macos-dmg:
  stage: package
  tags: [macos, xcode]
  needs:
    - job: build:desktop:macos
      artifacts: true
  before_script:
    - export PATH="/opt/homebrew/bin:$PATH"
    # Explicitly set VERSION for shell executor (CI variables may not auto-expand)
    - export VERSION="${CI_COMMIT_TAG:-dev}"
    - echo "VERSION=$VERSION"
    - brew install create-dmg || true
  script:
    - cd runner
    - export VERSION="${CI_COMMIT_TAG:-dev}"
    - echo "Creating DMG with VERSION=$VERSION"
    - |
      # Create .app bundle with universal binary
      APP_NAME="AgentsMesh Runner.app"
      mkdir -p "$APP_NAME/Contents/MacOS"
      mkdir -p "$APP_NAME/Contents/Resources"

      cp runner-desktop-darwin-universal "$APP_NAME/Contents/MacOS/runner-desktop"
      chmod +x "$APP_NAME/Contents/MacOS/runner-desktop"

      # Update Info.plist with version
      sed "s/1.0.0/${VERSION#v}/g" build/darwin/Info.plist > "$APP_NAME/Contents/Info.plist"

      # Create DMG
      DMG_NAME="AgentsMesh-Runner-${VERSION}-darwin-universal.dmg"
      create-dmg \
        --volname "AgentsMesh Runner" \
        --window-pos 200 120 \
        --window-size 600 400 \
        --icon-size 100 \
        --icon "AgentsMesh Runner.app" 150 185 \
        --hide-extension "AgentsMesh Runner.app" \
        --app-drop-link 450 185 \
        "$DMG_NAME" \
        "AgentsMesh Runner.app" || true

      # Handle create-dmg leaving temp file on AppleScript timeout
      # Temp files have rw.XXXXX. prefix
      if [ ! -f "$DMG_NAME" ]; then
        TEMP_DMG=$(ls rw.*.dmg 2>/dev/null | head -1)
        if [ -n "$TEMP_DMG" ]; then
          echo "Renaming temp DMG: $TEMP_DMG -> $DMG_NAME"
          mv "$TEMP_DMG" "$DMG_NAME"
        fi
      fi
    - ls -la *.dmg
  artifacts:
    paths:
      - runner/*.dmg
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

package:linux-archive:
  stage: package
  tags: [x86, docker]
  image: alpine:latest
  needs:
    - job: build:desktop:linux
      artifacts: true
  script:
    - cd runner
    - |
      tar -czvf "AgentsMesh-Runner-${VERSION}-linux-amd64.tar.gz" \
        runner-desktop-linux-amd64
  artifacts:
    paths:
      - runner/*.tar.gz
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

package:windows-archive:
  stage: package
  tags: [x86, docker]
  image: alpine:latest
  needs:
    - job: build:desktop:windows
      artifacts: true
  before_script:
    - apk add --no-cache zip
  script:
    - cd runner
    - |
      zip "AgentsMesh-Runner-${VERSION}-windows-amd64.zip" \
        runner-desktop-windows-amd64.exe
  artifacts:
    paths:
      - runner/*.zip
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Release to GitHub
# =============================================================================

release:github:
  stage: release
  tags: [x86, docker]
  image: alpine:latest
  needs:
    - job: build:cli
      artifacts: true
    - job: package:macos-dmg
      artifacts: true
    - job: package:linux-archive
      artifacts: true
    - job: package:windows-archive
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      set -e

      echo "=============================================="
      echo "GitHub Release for $CI_COMMIT_TAG"
      echo "=============================================="
      echo "Start time: $(date)"
      echo ""

      # Helper function for curl with retry, timeout, and progress
      curl_retry() {
        local max_attempts=3
        local attempt=1
        local exit_code=0
        while [ $attempt -le $max_attempts ]; do
          echo "    [Attempt $attempt/$max_attempts] $(date +%H:%M:%S)"
          if curl --connect-timeout 30 --max-time 300 -w "\n    HTTP Status: %{http_code}, Time: %{time_total}s\n" "$@"; then
            return 0
          fi
          exit_code=$?
          echo "    [FAILED] curl exit code: $exit_code"
          if [ $attempt -lt $max_attempts ]; then
            echo "    Waiting 5s before retry..."
            sleep 5
          fi
          attempt=$((attempt + 1))
        done
        echo "    [ERROR] All $max_attempts attempts failed"
        return $exit_code
      }

      # List available artifacts
      echo "[Step 1/5] Listing artifacts..."
      echo "  CLI artifacts (runner/dist/):"
      ls -lh runner/dist/*.tar.gz runner/dist/*.zip 2>/dev/null || echo "    (none)"
      echo "  Linux packages (runner/dist/):"
      ls -lh runner/dist/*.deb runner/dist/*.rpm runner/dist/*.apk 2>/dev/null || echo "    (none)"
      echo "  Desktop artifacts (runner/):"
      ls -lh runner/*.dmg runner/AgentsMesh*.tar.gz runner/AgentsMesh*.zip 2>/dev/null || echo "    (none)"
      echo ""

      # Check if release already exists
      echo "[Step 2/5] Checking existing release..."
      EXISTING_RELEASE=$(curl_retry -s \
        -H "Authorization: token $GITHUB_RELEASE_TOKEN" \
        "https://api.github.com/repos/AgentsMesh/AgentsMeshRunner/releases/tags/$CI_COMMIT_TAG" 2>&1) || true

      EXISTING_ID=$(echo "$EXISTING_RELEASE" | jq -r '.id // empty')

      if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
        echo "  Found existing release (ID: $EXISTING_ID), deleting..."
        curl_retry -s -X DELETE \
          -H "Authorization: token $GITHUB_RELEASE_TOKEN" \
          "https://api.github.com/repos/AgentsMesh/AgentsMeshRunner/releases/$EXISTING_ID" || true
        echo "  Waiting 2s for GitHub to process deletion..."
        sleep 2
      else
        echo "  No existing release found"
      fi
      echo ""

      # Create release
      echo "[Step 3/5] Creating new release..."
      RELEASE_RESPONSE=$(curl_retry -s -X POST \
        -H "Authorization: token $GITHUB_RELEASE_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"tag_name\":\"$CI_COMMIT_TAG\",\"name\":\"AgentsMesh Runner $CI_COMMIT_TAG\",\"draft\":false,\"prerelease\":false}" \
        "https://api.github.com/repos/AgentsMesh/AgentsMeshRunner/releases")

      RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id // empty')
      UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url // empty' | sed 's/{.*}//')

      if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
        echo "  [ERROR] Failed to create release!"
        echo "  Response: $RELEASE_RESPONSE"
        exit 1
      fi

      echo "  Release created successfully!"
      echo "  Release ID: $RELEASE_ID"
      echo "  Upload URL: $UPLOAD_URL"
      echo ""

      # Upload CLI artifacts
      echo "[Step 4/5] Uploading CLI artifacts..."
      upload_count=0
      upload_failed=0

      for file in runner/dist/*.tar.gz runner/dist/*.zip; do
        if [ -f "$file" ]; then
          filename=$(basename "$file")
          filesize=$(ls -lh "$file" | awk '{print $5}')
          echo "  [$((upload_count + 1))] $filename ($filesize)"
          if curl_retry -s -X POST \
            -H "Authorization: token $GITHUB_RELEASE_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$file" \
            "$UPLOAD_URL?name=$filename" > /dev/null; then
            echo "    [OK] Uploaded successfully"
            upload_count=$((upload_count + 1))
          else
            echo "    [FAILED] Upload failed"
            upload_failed=$((upload_failed + 1))
          fi
        fi
      done

      # Upload Linux packages
      for file in runner/dist/*.deb runner/dist/*.rpm runner/dist/*.apk; do
        if [ -f "$file" ]; then
          filename=$(basename "$file")
          filesize=$(ls -lh "$file" | awk '{print $5}')
          echo "  [$((upload_count + 1))] $filename ($filesize)"
          if curl_retry -s -X POST \
            -H "Authorization: token $GITHUB_RELEASE_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$file" \
            "$UPLOAD_URL?name=$filename" > /dev/null; then
            echo "    [OK] Uploaded successfully"
            upload_count=$((upload_count + 1))
          else
            echo "    [FAILED] Upload failed"
            upload_failed=$((upload_failed + 1))
          fi
        fi
      done
      echo ""

      # Upload Desktop artifacts
      echo "[Step 5/5] Uploading Desktop artifacts..."
      for file in runner/*.dmg runner/*.tar.gz runner/*.zip; do
        if [ -f "$file" ] && [[ "$(basename "$file")" == AgentsMesh* ]]; then
          filename=$(basename "$file")
          filesize=$(ls -lh "$file" | awk '{print $5}')
          echo "  [$((upload_count + 1))] $filename ($filesize)"
          if curl_retry -s -X POST \
            -H "Authorization: token $GITHUB_RELEASE_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$file" \
            "$UPLOAD_URL?name=$filename" > /dev/null; then
            echo "    [OK] Uploaded successfully"
            upload_count=$((upload_count + 1))
          else
            echo "    [FAILED] Upload failed"
            upload_failed=$((upload_failed + 1))
          fi
        fi
      done
      echo ""

      # Summary
      echo "=============================================="
      echo "Release Summary"
      echo "=============================================="
      echo "End time: $(date)"
      echo "Files uploaded: $upload_count"
      echo "Files failed: $upload_failed"
      echo "Release URL: https://github.com/AgentsMesh/AgentsMeshRunner/releases/tag/$CI_COMMIT_TAG"
      echo ""

      if [ $upload_failed -gt 0 ]; then
        echo "[WARNING] Some uploads failed!"
        exit 1
      fi

      echo "[SUCCESS] Release complete!"
  rules:
    - if: $CI_COMMIT_TAG
