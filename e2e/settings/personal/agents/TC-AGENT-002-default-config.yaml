id: TC-AGENT-002
name: Claude Code 默认配置验证
description: 验证 Claude Code 页面默认显示 RunnerHost 模式
priority: high
module: settings/personal/agents

preconditions:
  - 用户已登录
  - 无自定义凭据配置

steps:
  - action: 导航到 Claude Code 配置页面
    url: /dev-org/settings?scope=personal&tab=agents/claude-code
    expected: 页面加载成功
    verification:
      type: ui
      check:
        - exists: 'heading "Claude Code"'
        - exists: 'heading "API 凭据"'
        - exists: 'heading "运行时配置"'

  - action: 验证默认 RunnerHost 模式
    expected: 显示 RunnerHost 为默认
    verification:
      type: ui
      check:
        - exists: 'text "RunnerHost"'
        - exists: 'text "默认"'
        - exists: 'text "使用 Runner 机器本地的环境配置"'

  - action: 验证添加凭据按钮存在
    verification:
      type: ui
      check:
        - exists: 'button "添加自定义凭据"'

  - action: 验证运行时配置选项
    verification:
      type: ui
      check:
        - exists: 'checkbox "启用 MCP 集成"'
        - exists: 'combobox "模型"'
        - exists: 'combobox "权限模式"'
        - exists: 'combobox "思考级别"'
        - exists: 'button "保存更改"'
