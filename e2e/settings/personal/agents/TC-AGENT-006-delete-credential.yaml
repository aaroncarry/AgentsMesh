id: TC-AGENT-006
name: 删除自定义凭据
description: 验证删除自定义凭据后恢复 RunnerHost 默认
priority: medium
module: settings/personal/agents

preconditions:
  - 用户已登录
  - 已存在自定义凭据且为默认

setup:
  - action: 创建并设为默认的测试凭据
    api:
      - method: POST
        url: /api/v1/users/agent-credentials/types/claude-code
        body:
          name: Delete Test Credential
          api_key: sk-ant-test-delete-key
        save:
          credential_id: body.profile.id
      - method: POST
        url: /api/v1/users/agent-credentials/profiles/{credential_id}/set-default

steps:
  - action: 导航到 Claude Code 配置页面
    url: /dev-org/settings?scope=personal&tab=agents/claude-code
    expected: 页面加载成功

  - action: 验证测试凭据存在且为默认
    verification:
      type: ui
      check:
        - exists: 'text "Delete Test Credential"'
        - exists: 'text "默认"'

  - action: 点击删除按钮
    selector: 凭据行的删除图标按钮
    expected: 显示确认对话框
    verification:
      type: ui
      check:
        - exists: 'dialog "确定要删除此配置吗？"'

  - action: 确认删除
    selector: 确认按钮
    expected: 凭据被删除
    verification:
      type: ui
      check:
        - not_exists: 'text "Delete Test Credential"'

  - action: 验证 RunnerHost 恢复为默认
    verification:
      type: ui
      check:
        - exists: 'text "RunnerHost"'
        - exists: 'text "默认"'
