id: TC-AGENT-003
name: 添加自定义 API 凭据
description: 验证添加自定义 API 凭据功能
priority: high
module: settings/personal/agents

preconditions:
  - 用户已登录

steps:
  - action: 导航到 Claude Code 配置页面
    url: /dev-org/settings?scope=personal&tab=agents/claude-code
    expected: 页面加载成功

  - action: 点击添加自定义凭据按钮
    selector: 'button "添加自定义凭据"'
    expected: 显示添加凭据对话框
    verification:
      type: ui
      check:
        - exists: 'heading "添加自定义凭据"'
        - exists: 'textbox "配置名称"'
        - exists: 'textbox "描述"'
        - exists: 'textbox "Base URL"'
        - exists: 'textbox "API 密钥"'
        - exists: 'button "取消"'
        - exists: 'button "创建" disabled'

  - action: 填写凭据信息
    form:
      - field: 配置名称
        value: E2E Test Credential
      - field: 描述
        value: Test credential for E2E testing
      - field: API 密钥
        value: sk-ant-test-key-12345
    expected: 创建按钮变为可用

  - action: 点击创建按钮
    selector: 'button "创建"'
    expected: 凭据创建成功
    verification:
      type: ui
      check:
        - exists: 'text "配置创建成功"'
        - exists: 'text "E2E Test Credential"'
        - exists: 'text "已配置: api_key"'

cleanup:
  - action: 删除测试凭据
    steps:
      - 点击凭据删除按钮
      - 确认删除
