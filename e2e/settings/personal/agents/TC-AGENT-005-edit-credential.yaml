id: TC-AGENT-005
name: 编辑自定义凭据
description: 验证编辑自定义凭据的名称和 API Key
priority: medium
module: settings/personal/agents

preconditions:
  - 用户已登录
  - 已存在自定义凭据

setup:
  - action: 创建测试凭据
    api:
      method: POST
      url: /api/v1/users/agent-credentials/types/claude-code
      body:
        name: Edit Test Credential
        api_key: sk-ant-test-edit-key

steps:
  - action: 导航到 Claude Code 配置页面
    url: /dev-org/settings?scope=personal&tab=agents/claude-code
    expected: 页面加载成功

  - action: 找到测试凭据并点击编辑按钮
    selector: 凭据行的编辑图标按钮
    expected: 显示编辑对话框
    verification:
      type: ui
      check:
        - exists: 'heading "编辑凭据"'
        - exists: 'textbox value="Edit Test Credential"'

  - action: 修改凭据名称
    form:
      - field: 配置名称
        value: Updated Credential Name
    expected: 名称已更新

  - action: 点击保存按钮
    selector: 'button "保存"'
    expected: 更新成功
    verification:
      type: ui
      check:
        - exists: 'text "Updated Credential Name"'

cleanup:
  - sql: |
      DELETE FROM user_agent_credential_profiles
      WHERE name IN ('Edit Test Credential', 'Updated Credential Name');
