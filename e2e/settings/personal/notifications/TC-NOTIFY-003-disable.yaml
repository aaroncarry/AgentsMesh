id: TC-NOTIFY-003
name: 禁用推送通知
description: 验证点击禁用按钮后推送通知被禁用
priority: medium
module: settings/personal/notifications

preconditions:
  - 用户已登录
  - 推送通知当前为启用状态

steps:
  - action: 导航到通知设置页面
    url: /dev-org/settings?scope=personal&tab=notifications
    expected: 页面加载成功

  - action: 确保推送通知已启用
    verification:
      type: ui
      check:
        - exists: 'button "禁用"'
    fallback:
      - 如果显示"启用"按钮，先点击启用

  - action: 点击禁用按钮
    selector: 'button "禁用"'
    expected: 推送通知被禁用
    verification:
      type: ui
      check:
        - exists: 'button "启用"'

  - action: 刷新页面验证状态持久化
    refresh: true
    verification:
      type: ui
      check:
        - exists: 'button "启用"'
