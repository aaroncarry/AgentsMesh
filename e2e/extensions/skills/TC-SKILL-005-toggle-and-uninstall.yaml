id: TC-SKILL-005
name: Skill 启用/禁用和卸载
description: 验证已安装 Skill 的启用/禁用切换和卸载功能，包括确认对话框
priority: critical
must_execute: true
module: extensions/skills
tags:
  - ui
  - api
  - browser
  - mcp-required

preconditions:
  - 开发环境已启动
  - 浏览器可访问
  - 用户已登录
  - Repository Demo WebApp 存在

setup:
  sql: |
    -- 创建测试用 installed_skill
    INSERT INTO installed_skills (organization_id, repository_id, scope, installed_by, slug, install_source, is_enabled, created_at, updated_at)
    SELECT
      r.organization_id,
      r.id,
      'user',
      u.id,
      'e2e-test-skill-toggle',
      'upload',
      true,
      NOW(),
      NOW()
    FROM repositories r
    CROSS JOIN users u
    WHERE r.full_path = 'dev-org/demo-webapp'
      AND u.email = 'dev@agentsmesh.local'
    ON CONFLICT DO NOTHING;

steps:
  - action: 登录并导航到 Repository Extensions Tab
    expected: 显示 Extensions Tab
    verification:
      type: ui
      navigate: /login
      actions:
        - fill:
            selector: 'input[type="email"]'
            value: dev@agentsmesh.local
        - fill:
            selector: 'input[type="password"]'
            value: devpass123
        - click:
            selector: 'button[type="submit"]'
      wait_for: Dashboard

  - action: 导航到 Repository Extensions Tab
    expected: 显示已安装的测试 Skill
    verification:
      type: ui
      navigate: /dev-org/repositories
      wait_for: Demo WebApp
      actions:
        - click:
            text: Demo WebApp
      wait_for: Information
      actions:
        - click:
            text: Extensions
      wait_for: Skills

  - action: 验证测试 Skill 显示在 My Installations 列表
    expected: 列表中包含测试 Skill
    verification:
      type: ui
      check:
        - contains: e2e-test-skill-toggle

  - action: 点击 Switch 禁用 Skill
    expected: Skill 被禁用
    verification:
      type: ui
      actions:
        - click:
            selector: '[aria-label="Toggle enabled"]'
      wait_for: 1000

  - action: 验证 Skill 已禁用（API 层验证）
    expected: Skill is_enabled = false
    verification:
      type: api
      request:
        method: GET
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/skills?scope=user
        auth: dev@agentsmesh.local
      expect:
        status: 200
        body:
          - path: skills[?slug='e2e-test-skill-toggle'].is_enabled
            equals: false

  - action: 再次点击 Switch 启用 Skill
    expected: Skill 被重新启用
    verification:
      type: ui
      actions:
        - click:
            selector: '[aria-label="Toggle enabled"]'
      wait_for: 1000

  - action: 点击删除按钮
    expected: 弹出卸载确认对话框
    verification:
      type: ui
      actions:
        - click:
            selector: 'button.text-destructive'
      wait_for: Uninstall Skill
      check:
        - contains: Are you sure
        - contains: e2e-test-skill-toggle
        - contains: Uninstall
        - contains: Cancel

  - action: 点击 Cancel 取消卸载
    expected: 对话框关闭，Skill 仍在列表中
    verification:
      type: ui
      actions:
        - click:
            text: Cancel
      check:
        - contains: e2e-test-skill-toggle

  - action: 再次点击删除并确认
    expected: Skill 被成功卸载
    verification:
      type: ui
      actions:
        - click:
            selector: 'button.text-destructive'
      wait_for: Uninstall Skill
      actions:
        - click:
            text: Uninstall
      wait_for: Uninstalled successfully

  - action: 验证 Skill 已从列表移除
    expected: 列表中不再包含该 Skill
    verification:
      type: ui
      check:
        - not_exists: 'text "e2e-test-skill-toggle"'

cleanup:
  - sql: |
      DELETE FROM installed_skills WHERE slug = 'e2e-test-skill-toggle';
