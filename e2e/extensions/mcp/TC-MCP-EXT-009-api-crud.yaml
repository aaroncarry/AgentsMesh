id: TC-MCP-EXT-009
name: MCP Server API CRUD 完整流程
description: 验证 MCP Server 的 API 层完整 CRUD 操作，包括模板列表、安装、更新、卸载
priority: high
module: extensions/mcp
tags:
  - api

preconditions:
  - 开发环境已启动
  - 用户 dev@agentsmesh.local 已存在
  - 组织 dev-org 存在
  - Repository Demo WebApp 存在
  - mcp_market_items 有 seed 数据

setup:
  sql: |
    DELETE FROM installed_mcp_servers
    WHERE repository_id IN (
      SELECT id FROM repositories WHERE full_path = 'dev-org/demo-webapp'
    ) AND slug LIKE 'e2e-api-%';

steps:
  - action: 查询 MCP Market 模板列表
    expected: 返回预置模板
    verification:
      type: api
      request:
        method: GET
        path: /api/v1/organizations/dev-org/market/mcp-servers
        auth: dev@agentsmesh.local
      expect:
        status: 200
        body:
          - path: mcp_servers
            not_empty: true
          - path: total
            greater_than: 0

  - action: 搜索 MCP Market 模板
    expected: 搜索结果正确过滤
    verification:
      type: api
      request:
        method: GET
        path: /api/v1/organizations/dev-org/market/mcp-servers?q=postgres
        auth: dev@agentsmesh.local
      expect:
        status: 200
        body:
          - path: mcp_servers[0].slug
            equals: postgres

  - action: 从 Market 安装 MCP Server
    expected: 安装成功
    verification:
      type: api
      request:
        method: POST
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/mcp-servers/install-from-market
        auth: dev@agentsmesh.local
        body:
          market_item_id: 5
          scope: user
      expect:
        status_one_of: [200, 201]
        body:
          - path: mcp_server.slug
            equals: filesystem

  - action: 安装自定义 MCP Server
    expected: 安装成功
    verification:
      type: api
      request:
        method: POST
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/mcp-servers/install-custom
        auth: dev@agentsmesh.local
        body:
          name: E2E API Custom
          slug: e2e-api-custom
          transport_type: stdio
          command: node
          args: ["server.js"]
          env_vars:
            API_KEY: test-key
          scope: user
      expect:
        status_one_of: [200, 201]
        body:
          - path: mcp_server.slug
            equals: e2e-api-custom

  - action: 查询已安装 MCP Servers
    expected: 返回两个已安装的 MCP Server
    verification:
      type: api
      request:
        method: GET
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/mcp-servers?scope=user
        auth: dev@agentsmesh.local
      expect:
        status: 200
        body:
          - path: mcp_servers
            length_gte: 2

  - action: 更新 MCP Server（禁用 + 修改环境变量）
    expected: 更新成功
    verification:
      type: api
      request:
        method: PUT
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/mcp-servers/{install_id}
        auth: dev@agentsmesh.local
        body:
          is_enabled: false
          env_vars:
            API_KEY: updated-key
      expect:
        status: 200
        body:
          - path: mcp_server.is_enabled
            equals: false

  - action: 卸载自定义 MCP Server
    expected: 卸载成功
    verification:
      type: api
      request:
        method: DELETE
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/mcp-servers/{install_id}
        auth: dev@agentsmesh.local
      expect:
        status_one_of: [200, 204]

  - action: 验证卸载后列表更新
    expected: 自定义 MCP Server 已移除
    verification:
      type: api
      request:
        method: GET
        path: /api/v1/organizations/dev-org/repositories/{repo_id}/mcp-servers?scope=user
        auth: dev@agentsmesh.local
      expect:
        status: 200

cleanup:
  - sql: |
      DELETE FROM installed_mcp_servers
      WHERE repository_id IN (
        SELECT id FROM repositories WHERE full_path = 'dev-org/demo-webapp'
      ) AND slug IN ('filesystem', 'e2e-api-custom');
