name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  REGISTRY: registry.agentsmesh.ai
  DOCKERHUB_NAMESPACE: agentsmesh
  GO_VERSION: "1.25"
  REGISTRY_PREFIX: "registry.agentsmesh.ai/library/"

jobs:
  # ===========================================================================
  # Build and push Docker images (server-side services)
  # main push: backend, web, web-admin, relay (short sha tag)
  # v* tag:    backend, web, web-admin, relay (semver tags)
  # ===========================================================================

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: ci/backend.Dockerfile
            context: .
            use_ecr: true
          - service: web
            dockerfile: ci/web.Dockerfile
            context: ./web
            use_ecr: true
          - service: web-admin
            dockerfile: ci/web-admin.Dockerfile
            context: ./web-admin
            use_ecr: true
          - service: relay
            dockerfile: ci/relay.Dockerfile
            context: .
            use_ecr: true
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set version tag
        id: version
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=public.ecr.aws/vend/moby/buildkit:buildx-stable-1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to AgentsMesh Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.service }}
            ${{ env.REGISTRY }}/agentsmesh/${{ matrix.service }}
          tags: |
            # main branch: short sha only
            type=sha,enable={{is_default_branch}}
            # version tags: v1.0.0, v1.0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            REGISTRY_PREFIX=${{ matrix.use_ecr && env.REGISTRY_PREFIX || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64

  # ===========================================================================
  # Deploy to US West production (main branch only, auto after build)
  # Requires self-hosted runner with SSH access to production servers.
  # ===========================================================================

  deploy-uswest:
    name: Deploy US West
    needs: build-images
    runs-on: [self-hosted, deploy]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Backend
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Deploying Backend ${VERSION} to US West..."
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && git pull origin main"
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./deploy.sh uswest-prod --service backend --version ${VERSION}"

      - name: Deploy Web
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Deploying Web ${VERSION} to US West..."
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./deploy.sh uswest-prod --service web --version ${VERSION}"

      - name: Deploy Web-Admin
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Deploying Web-Admin ${VERSION} to US West..."
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./deploy.sh uswest-prod --service web-admin --version ${VERSION}"

      - name: Deploy Relay (uswest-relay-01)
        run: |
          echo "Deploying Relay to uswest-relay-01..."
          ssh aliyun-us-west-relay-001 "cd /opt/agentsmesh && git pull origin main"
          ssh aliyun-us-west-relay-001 "cd /opt/agentsmesh/relay && ./deploy.sh uswest-relay-01 --pull"

      - name: Deploy Relay (uswest-relay-beijing-02)
        run: |
          echo "Deploying Relay to uswest-relay-beijing-02..."
          ssh aliyun-agentsmesh-us-relay-beijing-002 "cd /opt/agentsmesh && git pull origin main"
          ssh aliyun-agentsmesh-us-relay-beijing-002 "cd /opt/agentsmesh/relay && ./deploy.sh uswest-relay-beijing-02 --pull"

      - name: Run Database Migration
        run: |
          echo "Running database migration on US West..."
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./migrate.sh uswest-prod --direction up"

  # ===========================================================================
  # Deploy to China production (main branch only, auto after build)
  # ===========================================================================

  deploy-cn:
    name: Deploy China
    needs: build-images
    runs-on: [self-hosted, deploy]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Backend
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Deploying Backend ${VERSION} to China..."
          ssh aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
          ssh aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service backend --version ${VERSION}"

      - name: Deploy Web
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Deploying Web ${VERSION} to China..."
          ssh aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web --version ${VERSION}"

      - name: Deploy Web-Admin
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Deploying Web-Admin ${VERSION} to China..."
          ssh aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web-admin --version ${VERSION}"

      - name: Deploy Relay (cn-relay-01)
        run: |
          echo "Deploying Relay to cn-relay-01..."
          ssh aliyun-cn-relay-01 "cd /opt/agentsmesh && git pull origin main"
          ssh aliyun-cn-relay-01 "cd /opt/agentsmesh/relay && ./deploy.sh cn-relay-01 --pull"

      - name: Run Database Migration
        run: |
          echo "Running database migration on China..."
          ssh aliyun-s001 "cd /opt/agentsmesh && ./migrate.sh cn-prod --direction up"

  # ===========================================================================
  # Build Runner CLI + Create GitHub Release (tag only)
  # Runner is a client-side binary distributed via GitHub Release, not Docker.
  # ===========================================================================

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runner/go.sum

      - name: Install rcodesign (macOS code signing)
        run: |
          RCODESIGN_VERSION="0.29.0"
          cd /tmp
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo cp ./apple-codesign-*/rcodesign /usr/local/bin/
          rm -rf ./apple-codesign-*

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: runner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
