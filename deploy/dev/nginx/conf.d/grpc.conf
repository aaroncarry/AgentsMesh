# Development gRPC + mTLS Configuration
#
# For development environment using Docker Compose.
# In production, use deploy/nginx/grpc.conf with proper certificates.
#
# Note: This file is only loaded if mTLS certificates exist.
# Runners connect via gRPC+mTLS for secure bidirectional streaming.

# Docker DNS resolver for dynamic upstream resolution
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# gRPC + mTLS server for Runner connections
server {
    listen 9443 ssl;
    http2 on;
    server_name _;

    # Access log for debugging
    access_log /var/log/nginx/grpc_access.log;
    error_log /var/log/nginx/grpc_error.log debug;

    # ==================== TLS Configuration ====================

    # Server certificate (development self-signed or from CA)
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # mTLS: Require and verify client certificate
    ssl_client_certificate /etc/nginx/ssl/ca.crt;
    ssl_verify_client on;

    # TLS 1.3 only
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ==================== gRPC Proxy Configuration ====================

    # Use variable for dynamic DNS resolution
    set $grpc_backend backend:9090;

    location / {
        grpc_pass grpc://$grpc_backend;

        # Pass client certificate information to backend
        # $ssl_client_s_dn contains the full Subject DN, e.g., "CN=runner-node-id,O=AgentMesh"
        # Backend extracts CN from the DN string
        # Note: Use lowercase header names to match gRPC metadata convention
        grpc_set_header x-client-cert-dn $ssl_client_s_dn;
        grpc_set_header x-client-cert-serial $ssl_client_serial;
        grpc_set_header x-client-cert-fingerprint $ssl_client_fingerprint;

        # Forward real IP
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeouts for streaming (24 hours)
        grpc_read_timeout 86400s;
        grpc_send_timeout 86400s;

        # Buffer sizes
        grpc_buffer_size 64k;

        # Connection keepalive
        grpc_socket_keepalive on;
    }
}
