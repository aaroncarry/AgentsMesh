services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: agentmesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentmesh_dev}
      POSTGRES_DB: agentmesh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: agentmesh-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO object storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: agentmesh-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (database management UI)
  adminer:
    image: adminer:latest
    container_name: agentmesh-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  # Backend API server with hot reload
  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/dev/backend.Dockerfile
    container_name: agentmesh-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agentmesh
      - DB_PASSWORD=${POSTGRES_PASSWORD:-agentmesh_dev}
      - DB_NAME=agentmesh
      - DB_SSLMODE=disable
      # Redis
      - REDIS_URL=redis://redis:6379
      # Auth
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      # Server
      - SERVER_ADDRESS=:8080
      - DEBUG=true
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://192.168.100.189
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
      - LOG_FILE=/app/logs/agentmesh.log
      # Email
      - EMAIL_PROVIDER=console
      - FRONTEND_BASE_URL=http://localhost
      # OAuth - GitHub
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URL=http://localhost/api/v1/auth/oauth/github/callback
      # Storage (MinIO/S3)
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_PUBLIC_ENDPOINT=localhost:9000
      - STORAGE_REGION=us-east-1
      - STORAGE_BUCKET=agentmesh
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_USE_SSL=false
      - STORAGE_USE_PATH_STYLE=true
      - STORAGE_MAX_FILE_SIZE=10
      - STORAGE_ALLOWED_TYPES=image/jpeg,image/png,image/gif,image/webp,application/pdf
    volumes:
      # Mount source code for hot reload
      - ../../backend:/app
      # Persist Go modules cache
      - go-mod-cache:/go/pkg/mod
      # Persist build cache
      - go-build-cache:/root/.cache/go-build
      # Persist logs
      - ../../backend/logs:/app/logs
    # No external port - accessed via nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # Next.js frontend with hot reload
  web:
    build:
      context: ../../web
      dockerfile: ../deploy/dev/web.Dockerfile
    container_name: agentmesh-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # API URL points to nginx (port 80)
      - NEXT_PUBLIC_API_URL=http://localhost
      - NEXT_PUBLIC_WS_URL=ws://localhost
      - NEXT_PUBLIC_GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      # Optimize for Docker environment
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source code for hot reload
      - ../../web:/app
      # Use container's node_modules (compiled for Linux)
      - web_node_modules:/app/node_modules
    # No external port - accessed via nginx

  # Runner with hot reload (runs as non-root user for Claude Code compatibility)
  runner:
    build:
      context: ../../runner
      dockerfile: ../deploy/dev/runner.Dockerfile
    container_name: agentmesh-runner
    restart: unless-stopped
    depends_on:
      - backend
    user: "1000:1000"
    environment:
      - BACKEND_URL=ws://backend:8080/api/v1/runner/ws
      - RUNNER_TOKEN=${RUNNER_TOKEN:-dev-runner-token}
      - WORKSPACE=/workspace
      - DEBUG=true
      - HOME=/home/runner
    volumes:
      # Mount source code for hot reload
      - ../../runner:/app
      # Persist Go modules cache (for non-root user)
      - runner-go-mod-cache:/go/pkg/mod
      # Persist build cache (for non-root user)
      - runner-go-build-cache:/home/runner/.cache/go-build
      # Workspace for sandboxes
      - runner_workspace:/tmp/agentmesh-workspace
      # AgentMesh config directory
      - runner_config:/home/runner/.agentmesh
    # Runner communicates with backend internally, no external port needed

  # Nginx reverse proxy (unified entry point)
  nginx:
    image: nginx:alpine
    container_name: agentmesh-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
  go-mod-cache:
  go-build-cache:
  runner-go-mod-cache:
  runner-go-build-cache:
  runner_workspace:
  runner_config:
  web_node_modules:

networks:
  default:
    name: agentmesh-network
