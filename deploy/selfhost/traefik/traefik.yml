# =============================================================================
# Traefik Static Configuration
# =============================================================================

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":8088"
  grpc:
    address: ":9443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO
  format: json

accessLog:
  format: json
