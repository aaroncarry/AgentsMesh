# =============================================================================
# gRPC mTLS Passthrough Configuration
# =============================================================================
#
# Traefik passes TLS through to the backend for mTLS verification.
# Flow: Runner -> Traefik (TLS passthrough) -> Backend (mTLS verification)
# =============================================================================

tcp:
  routers:
    grpc-mtls:
      entryPoints:
        - grpc
      rule: "HostSNI(`*`)"
      service: backend-grpc
      tls:
        passthrough: true

  services:
    backend-grpc:
      loadBalancer:
        servers:
          - address: "backend:9090"
