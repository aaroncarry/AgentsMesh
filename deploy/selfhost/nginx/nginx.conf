# =============================================================================
# AgentsMesh Nginx Configuration
# =============================================================================
#
# Domain: agentsmesh-dev.int.rclabenv.com
# Replaces Traefik with Nginx for reverse proxy functionality
#
# =============================================================================

# 错误日志配置
error_log /var/log/nginx/error.log warn;

# 事件配置
events {
    worker_connections 1024;
}

http {
    # 基础配置
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 上传大小限制
    client_max_body_size 100M;

    # WebSocket 升级配置
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 上游服务器配置
    upstream backend {
        server backend:8080;
    }

    upstream relay {
        server relay:8090;
    }

    upstream web {
        server web:3000;
    }

    upstream web-admin {
        server web-admin:3001;
    }

    # HTTP 服务器配置
    server {
        listen 80;
        server_name agentsmesh-dev.int.rclabenv.com;

        # 通用代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 健康检查端点
        location /health {
            proxy_pass http://backend;
        }

        # Backend API (最高优先级)
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # Admin Console API
        location /admin/api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # Relay (WebSocket 终端流)
        location /relay/ {
            # 去掉 /relay 前缀
            rewrite ^/relay/(.*)$ /$1 break;
            
            proxy_pass http://relay;
            proxy_http_version 1.1;
            
            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # WebSocket 超时配置
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            # 禁用缓冲以实现实时流
            proxy_buffering off;
        }

        # Admin Console 静态资源
        location /admin {
            proxy_pass http://web-admin;
            proxy_http_version 1.1;
        }

        # Web Frontend (最低优先级，catch-all)
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
        }

        # Next.js 热更新 WebSocket 支持 (开发环境)
        location /_next/webpack-hmr {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}

# =============================================================================
# TCP/gRPC Stream Configuration (for mTLS passthrough)
# =============================================================================
stream {
    # 日志配置
    log_format grpc '$remote_addr [$time_local] '
                    '$protocol $status $bytes_sent $bytes_received '
                    '$session_time';

    access_log /var/log/nginx/grpc_access.log grpc;

    # gRPC + mTLS 透传 (端口 9443)
    # Nginx 将 TLS 连接直接透传给 backend 进行 mTLS 验证
    server {
        listen 9443;
        
        proxy_pass backend:9090;
        
        # TCP 代理配置
        proxy_connect_timeout 5s;
        proxy_timeout 24h;
        proxy_buffer_size 16k;
    }
}

