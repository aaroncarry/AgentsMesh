# =============================================================================
# Nginx Frontend Proxy Configuration
# =============================================================================
#
# This nginx acts as the frontend proxy before Traefik.
# Architecture: Client -> Nginx -> Traefik -> Backend Services
#
# Features:
# - SSL/TLS termination (when USE_HTTPS=true)
# - Rate limiting
# - Request buffering
# - Static file caching
# - Security headers
# - gRPC passthrough for Runner connections
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Buffering settings
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream to Traefik
    upstream traefik_backend {
        server aqa01-i01-jpt44.int.rclabenv.com:8088;
        keepalive 32;
    }

    # HTTP Server
    server {
        listen 80 default_server;
        server_name agentsmesh-dev.int.rclabenv.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Connection limits
        limit_conn conn_limit 20;

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API endpoints with stricter rate limiting
        location /api {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://traefik_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket relay endpoint (terminal streaming)
        location /relay {
            limit_req zone=general_limit burst=10 nodelay;
            
            proxy_pass http://traefik_backend;
            proxy_http_version 1.1;
            
            # WebSocket headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts (longer for persistent connections)
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # All other traffic (frontend, etc.)
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            
            proxy_pass http://traefik_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}

# =============================================================================
# TCP Stream for gRPC mTLS Passthrough
# =============================================================================
# gRPC connections bypass HTTP layer and use TCP passthrough
# This ensures mTLS handshake happens directly between Runner and Backend

stream {
    log_format grpc '$remote_addr [$time_local] $protocol $status '
                    '$bytes_sent $bytes_received $session_time '
                    '"$upstream_addr" "$upstream_bytes_sent" "$upstream_bytes_received"';

    access_log /var/log/nginx/grpc_access.log grpc;

    # Upstream to Traefik gRPC port
    upstream traefik_grpc {
        server aqa01-i01-jpt44.int.rclabenv.com:9443;
    }

    # gRPC mTLS passthrough
    server {
        listen 9443;
        server_name agentsmesh-dev.int.rclabenv.com;
        
        proxy_pass traefik_grpc;
        proxy_connect_timeout 10s;
        
        # TCP settings for long-lived gRPC streams
        proxy_timeout 7d;
        proxy_buffer_size 16k;
    }
}

