# gRPC + mTLS Configuration for Runner Communication
#
# This configuration provides:
# - mTLS termination at Nginx (validates Runner client certificates)
# - gRPC proxy to backend (plain gRPC, no TLS on internal network)
# - Certificate CN (node_id) passed to backend via gRPC metadata
#
# Prerequisites:
# - ca.crt: AgentMesh CA certificate (for validating client certs)
# - server.crt: Server certificate (signed by CA)
# - server.key: Server private key
#
# Files should be placed in /etc/nginx/ssl/

# gRPC upstream (backend internal, no TLS)
upstream grpc_backend {
    server backend:9090;
    keepalive 100;
}

# gRPC + mTLS server for Runner connections
server {
    listen 9443 ssl http2;
    server_name _;

    # Access log for debugging
    access_log /var/log/nginx/grpc_access.log;
    error_log /var/log/nginx/grpc_error.log;

    # ==================== TLS Configuration ====================

    # Server certificate (presented to clients)
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # mTLS: Require and verify client certificate
    # Clients (Runners) must present a certificate signed by our CA
    ssl_client_certificate /etc/nginx/ssl/ca.crt;
    ssl_verify_client on;  # Reject connections without valid client cert

    # TLS 1.3 only (strongest security)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session caching for performance
    ssl_session_cache shared:SSL_GRPC:10m;
    ssl_session_timeout 1d;

    # ==================== gRPC Proxy Configuration ====================

    location / {
        # Proxy to backend gRPC server (no TLS on internal network)
        grpc_pass grpc://grpc_backend;

        # Pass client certificate information to backend via gRPC metadata
        # Backend reads these from context to identify the Runner
        # $ssl_client_s_dn contains the full Subject DN, e.g., "CN=runner-node-id,O=AgentMesh"
        # Backend extracts CN from the DN string
        grpc_set_header x-client-cert-dn $ssl_client_s_dn;
        grpc_set_header x-client-cert-serial $ssl_client_serial;
        grpc_set_header x-client-cert-fingerprint $ssl_client_fingerprint;

        # Forward real IP
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # gRPC timeout configuration
        # Long timeouts for streaming connections (24 hours)
        grpc_read_timeout 86400s;
        grpc_send_timeout 86400s;

        # Buffer sizes
        grpc_buffer_size 64k;

        # Connection keepalive
        grpc_socket_keepalive on;
    }

    # Health check endpoint (no mTLS required)
    # This can be used by load balancers
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
